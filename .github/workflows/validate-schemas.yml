name: Validate schemas

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-tools.txt

      - name: Install tooling dependencies
        run: pip install -r requirements-tools.txt

      - name: Validate JSON syntax of all schema files
        run: |
          set -euo pipefail
          fail=0
          for f in schemas/*.json examples/**/*.json; do
            if ! python -m json.tool "$f" > /dev/null 2>&1; then
              echo "::error file=$f::Invalid JSON syntax"
              fail=1
            fi
          done
          exit "$fail"

      - name: Validate schemas, examples, Tier A coverage, and conformance profiles
        run: python tools/validate.py

      - name: Validate RFC discussion links
        run: python tools/check_rfc_discussion_links.py

      - name: Run test suite
        run: pytest -q

      - name: Ensure committed schemas match RFC extractors
        run: |
          set -euo pipefail
          python tools/sync_schemas_from_rfcs.py
          if [[ -n "$(git status --porcelain -- schemas/)" ]]; then
            echo "::error::schemas/ differs from git after sync — run tools/sync_schemas_from_rfcs.py locally and commit."
            git --no-pager diff -- schemas/ || true
            git status --porcelain -- schemas/
            exit 1
          fi
