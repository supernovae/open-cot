name: Bug report
description: Report a reproducible bug in tooling, docs, or experiments
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Include exact command(s), files, and minimal input.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, CPU/GPU details
  - type: textarea
    id: logs
    attributes:
      label: Relevant output/logs
